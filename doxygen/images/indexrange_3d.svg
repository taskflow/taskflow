<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <rect width="680" height="300" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">tf::IndexRange&lt;int,3&gt;  —  2×3×4,  size() = 24</text>
  <text x="340" y="44" text-anchor="middle" font-size="12" fill="#555">dim0 (depth): 2 slices   ·   dim1 (rows): 3   ·   dim2 (cols): 4</text>

  <!-- Layout:
       Left grid:  row labels at x=32, cells x=55..315 (4 cols × 65px)
       Divider:    x=340 (25px gap after grid ends at 315)
       Right grid: row labels at x=362, cells x=385..645 (4 cols × 65px)
       Right margin: 680-645 = 35px  ✓ matches left margin ~32px
  -->

  <!-- ══════════════ Slice i=0 (blue) ══════════════ -->
  <text x="185" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#2874A6">Slice  i=0</text>

  <!-- col headers -->
  <text x="88"  y="90" text-anchor="middle" font-size="11" fill="#555">j=0</text>
  <text x="153" y="90" text-anchor="middle" font-size="11" fill="#555">j=1</text>
  <text x="218" y="90" text-anchor="middle" font-size="11" fill="#555">j=2</text>
  <text x="283" y="90" text-anchor="middle" font-size="11" fill="#555">j=3</text>

  <!-- k=0 -->
  <text x="32" y="115" text-anchor="middle" font-size="11" fill="#555">k=0</text>
  <rect x="55"  y="100" width="65" height="38" fill="#AED6F1" stroke="#2874A6" stroke-width="1.2"/>
