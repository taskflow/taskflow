  <text x="548" y="90" text-anchor="middle" font-size="11" fill="#555">j=2</text>
  <text x="613" y="90" text-anchor="middle" font-size="11" fill="#555">j=3</text>

  <!-- k=0 -->
  <text x="362" y="115" text-anchor="middle" font-size="11" fill="#555">k=0</text>
  <rect x="385" y="100" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="450" y="100" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="515" y="100" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="580" y="100" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>

  <!-- k=1 -->
  <text x="362" y="153" text-anchor="middle" font-size="11" fill="#555">k=1</text>
  <rect x="385" y="138" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="450" y="138" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="515" y="138" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="580" y="138" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>

  <!-- k=2 -->
  <text x="362" y="191" text-anchor="middle" font-size="11" fill="#555">k=2</text>
  <rect x="385" y="176" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="450" y="176" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="515" y="176" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>
  <rect x="580" y="176" width="65" height="38" fill="#A9DFBF" stroke="#1E8449" stroke-width="1.2"/>

  <!-- flat labels slice 1 -->
  <text x="418" y="123" text-anchor="middle" font-size="11" fill="#1E5631">12</text>
  <text x="483" y="123" text-anchor="middle" font-size="11" fill="#1E5631">13</text>
  <text x="548" y="123" text-anchor="middle" font-size="11" fill="#1E5631">14</text>
  <text x="613" y="123" text-anchor="middle" font-size="11" fill="#1E5631">15</text>
  <text x="418" y="161" text-anchor="middle" font-size="11" fill="#1E5631">16</text>
  <text x="483" y="161" text-anchor="middle" font-size="11" fill="#1E5631">17</text>
  <text x="548" y="161" text-anchor="middle" font-size="11" fill="#1E5631">18</text>
  <text x="613" y="161" text-anchor="middle" font-size="11" fill="#1E5631">19</text>
  <text x="418" y="199" text-anchor="middle" font-size="11" fill="#1E5631">20</text>
  <text x="483" y="199" text-anchor="middle" font-size="11" fill="#1E5631">21</text>
  <text x="548" y="199" text-anchor="middle" font-size="11" fill="#1E5631">22</text>
  <text x="613" y="199" text-anchor="middle" font-size="11" fill="#1E5631">23</text>

  <text x="515" y="232" text-anchor="middle" font-size="11" fill="#555">flat 12–23</text>

  <!-- divider: x=340, between right edge of left grid (315) and left edge of right grid (385) -->
  <line x1="340" y1="65" x2="340" y2="240" stroke="#CCCCCC" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="340" y="256" text-anchor="middle" font-size="12" fill="#888">dim 0 →</text>

  <!-- bottom note -->
  <rect x="20" y="268" width="640" height="26" rx="5" fill="#EBF5FB" stroke="#2874A6" stroke-width="1"/>
  <text x="340" y="285" text-anchor="middle" font-size="12" fill="#1a5276">Each slice is a valid 3D sub-box: dim0=[i,i+1), dim1=[0,3), dim2=[0,4)  —  flat size = 12</text>

</svg>
