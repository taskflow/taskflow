  <rect x="120" y="138" width="65" height="38" fill="#AED6F1" stroke="#2874A6" stroke-width="1.2"/>
  <rect x="185" y="138" width="65" height="38" fill="#AED6F1" stroke="#2874A6" stroke-width="1.2"/>
  <rect x="250" y="138" width="65" height="38" fill="#AED6F1" stroke="#2874A6" stroke-width="1.2"/>

