  <rect x="185" y="100" width="65" height="38" fill="#AED6F1" stroke="#2874A6" stroke-width="1.2"/>
  <rect x="250" y="100" width="65" height="38" fill="#AED6F1" stroke="#2874A6" stroke-width="1.2"/>

